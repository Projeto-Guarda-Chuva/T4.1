name: Avisar QA Central

on:
  push:
    branches:
      - main

jobs:
  notificar-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Enviar sinal para o Hub de QA
        run: |
          curl -X POST https://api.github.com/repos/Projeto-Guarda-Chuva/.github/dispatches \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.QA_TOKEN }}" \
          -d '{"event_type": "sinal-t41"}'